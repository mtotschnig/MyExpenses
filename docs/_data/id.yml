features:
  manage_accounts: Hingga lima akun dengan <b>transfer</b> (termasuk antar mata 
    uang berbeda)
  plans: Jumlah <b>templat</b> tanpa batas dan hingga tiga rencana untuk 
    transaksi <b>berulang</b>
  export: <b>Ekspor</b> ke QIF dan CSV. <b>Impor</b> dari QIF
  password: Data dapat dilindungi dengan <b>kata sandi</b> atau <b>kunci 
    layar</b> perangkat
  light_theme: <b>Tema</b> (gelap dan terang) serta <b>ukuran font</b> dapat 
    disesuaikan
  reconciliation: '<b>Rekonsiliasi</b>: Bandingkan status transaksi dengan mudah dengan
    rekening koran bank Anda'
  homescreen: <b>Widget</b> layar utama dan <b>pintasan</b> untuk entri data 
    cepat
contrib:
  thank_you: |
    Kontribusi Anda mendukung pengembangan lebih lanjut My Expenses. Terima kasih!
  feature-list-title: 'Silakan berkontribusi dengan meningkatkan <i>{app_name}</i>
    dan dapatkan akses tanpa batas ke fitur-fitur berikut:'
  feature:
    accounts_unlimited: Buka kemampuan untuk membuat lebih dari lima akun
    plans_unlimited: Buka kemampuan untuk membuat lebih dari tiga rencana untuk 
      transaksi berulang
    distribution: '<b>Diagram lingkaran</b>: Visualisasikan distribusi statistik transaksi
      per kategori selama berbagai periode (tahun, bulan, minggu, hari)'
    split_transaction: '<b>Transaksi pembagian</b>: Satu transaksi dapat dibagi menjadi
      beberapa bagian (kategori dan transfer)'
    print: <b>Cetak</b> daftar transaksi ke file PDF
    ad_free: <b>Tanpa iklan</b>
    csv_import: <b>Impor CSV</b> yang canggih dan dapat disesuaikan (aplikasi 
      spreadsheet)
    auto_backup: <b>Cadangan otomatis</b> harian dengan unggah opsional ke 
      penyimpanan cloud
    cloud_sync: '<b>Sinkronisasi cloud</b>: Data dapat disinkronkan antar beberapa
      perangkat'
    split_template: Jumlah <b>templat dan rencana untuk transaksi pembagian</b> 
      tanpa batas
    email_support: <b>Dukungan email</b> dengan jaminan tanggapan dalam 2 hari 
      kerja
    roadmap_voting: Hak suara pada <b>peta jalan pengembangan</b>
    history_chart: <b>Diagram riwayat</b> (Arus kas)
    budgeting: '<b>Penganggaran</b>: Bandingkan pengeluaran Anda dengan batas yang
      Anda tetapkan per kategori secara harian, mingguan, bulanan, atau tahunan.'
    scan_receipt: '<b>Pindai struk</b>: Ekstrak jumlah, tanggal, dan penerima pembayaran
      secara otomatis'
    webui: <b>Antarmuka Pengguna Web</b>
    category_tree: Kedalaman <b>pohon kategori</b> tanpa batas
    banking: Unduh transaksi dari bank di Jerman (<b>FinTS</b>)
  one-time-payment: Pembayaran satu kali
  subscription: Langganan
